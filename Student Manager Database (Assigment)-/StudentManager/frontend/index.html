<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Record Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Student Record Manager</h1>
    <a href="add.html" class="btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add Student
    </a>
  </header>

  <main>
    <div class="section-header">
      <h2>All Students</h2>
    </div>
    <div id="message"></div>
    <div class="table-wrapper">
      <table id="studentTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="state-row"><td colspan="5">Loading students…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // ✅ Show success message if redirected from add/edit page
    const msg = sessionStorage.getItem("successMsg");
    if (msg) {
      showMessage(msg, "success");
      sessionStorage.removeItem("successMsg");
    }

    loadStudents();
  </script>

</body>
</html>
